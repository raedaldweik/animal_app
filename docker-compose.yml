# Containerized setup: the application plus a shipped PostgreSQL database.
# Run with:  docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: animaldb
      POSTGRES_USER: animal
      POSTGRES_PASSWORD: animal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animal -d animaldb"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: animaldb
      DB_USER: animal
      DB_PASSWORD: animal
    ports:
      - "8080:8080"

volumes:
  pgdata:
