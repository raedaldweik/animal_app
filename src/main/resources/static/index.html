<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Animal Picture App · Camunda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0a1424;
            --orange: #fc5d0d;
            --orange-2: #ff8a3d;
            --blue: #2f6fb0;
            --text: #eef2f8;
            --muted: #94a1ba;
            --glass: rgba(17, 27, 46, 0.55);
            --brd: rgba(252, 93, 13, 0.22);
            --brd-soft: rgba(148, 161, 186, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(0.75rem, 2vh, 1.5rem);
            position: relative;
        }

        /* ---------- animated background ---------- */
        .aurora { position: fixed; inset: 0; z-index: -2; overflow: hidden; }
        .aurora span { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5;
            animation: drift 20s ease-in-out infinite alternate; }
        .aurora .b1 { width: 48vw; height: 48vw; background: var(--orange); top: -16%; left: -10%; }
        .aurora .b2 { width: 42vw; height: 42vw; background: var(--orange-2); bottom: -20%; right: -8%; animation-delay: -7s; }
        .aurora .b3 { width: 34vw; height: 34vw; background: var(--blue); top: 35%; left: 55%; opacity: 0.35; animation-delay: -12s; }
        @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(3vw,5vh) scale(1.15); } }
        .grid { position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image:
                linear-gradient(rgba(148,161,186,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148,161,186,0.05) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, #000 35%, transparent 100%); }

        /* ---------- shell ---------- */
        .console {
            width: min(980px, 100%);
            max-height: 96dvh;
            display: flex;
            flex-direction: column;
            background: var(--glass);
            border: 1px solid var(--brd);
            border-radius: 22px;
            backdrop-filter: blur(22px) saturate(140%);
            -webkit-backdrop-filter: blur(22px) saturate(140%);
            box-shadow: 0 28px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: clamp(1.1rem, 2.4vh, 1.7rem);
            overflow: hidden;
        }
        .console::before { content: ""; position: absolute; left: 0; right: 0; top: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--orange), var(--orange-2), transparent); }

        header { display: flex; align-items: center; justify-content: space-between; gap: 1rem;
            padding-bottom: clamp(0.8rem, 2vh, 1.2rem); flex: 0 0 auto; }
        .brand { display: flex; align-items: center; gap: 0.8rem; }
        .logo { width: 42px; height: 42px; border-radius: 12px; object-fit: cover;
            box-shadow: 0 0 22px rgba(252,93,13,0.5); }
        h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
        h1 span { color: var(--orange); }
        .tagline { font-size: 0.74rem; color: var(--muted); letter-spacing: 0.3px; }

        /* ---------- two-pane body ---------- */
        .body { display: grid; grid-template-columns: minmax(260px, 320px) 1fr; gap: clamp(1rem, 2.5vw, 1.6rem);
            flex: 1 1 auto; min-height: 0; }

        .panel { display: flex; flex-direction: column; gap: clamp(0.8rem, 2vh, 1.2rem); min-height: 0; }
        .label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }

        .species { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
        .species button { cursor: pointer; color: var(--text); background: rgba(255,255,255,0.03);
            border: 1px solid var(--brd-soft); border-radius: 14px; padding: 0.8rem 0.3rem; font-family: inherit;
            font-weight: 600; font-size: 0.85rem; transition: all 0.22s ease; }
        .species button .emoji { display: block; font-size: 1.7rem; margin-bottom: 0.25rem; filter: grayscale(0.5); transition: 0.22s; }
        .species button:hover { transform: translateY(-2px); border-color: var(--orange); }
        .species button.active { border-color: transparent;
            background: linear-gradient(135deg, rgba(252,93,13,0.32), rgba(255,138,61,0.22));
            box-shadow: 0 0 22px rgba(252,93,13,0.4), inset 0 0 0 1px rgba(252,93,13,0.6); }
        .species button.active .emoji { filter: grayscale(0); transform: scale(1.1); }

        .controls { display: flex; flex-direction: column; gap: 0.7rem; }
        .stepper { display: flex; align-items: center; border: 1px solid var(--brd-soft); border-radius: 11px; overflow: hidden; width: fit-content; }
        .stepper button { width: 42px; height: 44px; background: rgba(255,255,255,0.04); color: var(--orange); border: none;
            font-size: 1.3rem; cursor: pointer; transition: 0.2s; }
        .stepper button:hover { background: rgba(252,93,13,0.16); }
        .stepper input { width: 60px; height: 44px; text-align: center; background: transparent; border: none; color: var(--text);
            font-size: 1.05rem; font-weight: 700; font-family: inherit; -moz-appearance: textfield; }
        .stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .btn-primary { cursor: pointer; height: 46px; border: none; border-radius: 11px; color: #fff; font-family: inherit;
            font-weight: 700; font-size: 0.9rem; letter-spacing: 0.3px;
            background: linear-gradient(120deg, var(--orange), var(--orange-2)); background-size: 180% 100%;
            transition: 0.3s; box-shadow: 0 8px 26px rgba(252,93,13,0.4); }
        .btn-primary:hover { background-position: 100% 0; box-shadow: 0 8px 34px rgba(252,93,13,0.55); }
        .btn-primary:disabled { opacity: 0.55; cursor: progress; }
        .btn-ghost { cursor: pointer; height: 44px; color: var(--orange-2); background: rgba(252,93,13,0.06);
            border: 1px solid rgba(252,93,13,0.32); border-radius: 11px; font-family: inherit; font-weight: 600;
            font-size: 0.85rem; transition: 0.25s; }
        .btn-ghost:hover { background: rgba(252,93,13,0.14); }

        #status { font-size: 0.85rem; min-height: 1.2rem; display: flex; align-items: center; gap: 0.5rem; color: var(--muted); }
        #status.error { color: #ff7a7a; }
        #status.ok { color: #4fd6a0; }
        .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--orange);
            border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---------- preview pane (height-locked) ---------- */
        .preview { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
        .viewport { flex: 1 1 auto; min-height: 0; border-radius: 16px; border: 1px solid var(--brd-soft);
            display: grid; place-items: center; overflow: hidden; padding: 0.6rem; position: relative;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0 12px, transparent 12px 24px); }
        .viewport.empty::after { content: "No picture yet — fetch one to begin"; font-size: 0.82rem; color: var(--muted); opacity: 0.7; }
        .viewport img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; border-radius: 10px; display: none; }
        .viewport.has-image { border-color: rgba(252,93,13,0.45); box-shadow: inset 0 0 36px rgba(252,93,13,0.1); }
        .viewport.has-image img { display: block; }

        .meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.8rem; flex: 0 0 auto; }
        .chip { font-size: 0.74rem; background: rgba(255,255,255,0.04); border: 1px solid var(--brd-soft); border-radius: 8px;
            padding: 0.35rem 0.6rem; color: var(--muted); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chip b { color: var(--orange-2); font-weight: 700; }

        @media (max-width: 760px) {
            body { overflow: auto; }
            .body { grid-template-columns: 1fr; }
            .viewport { min-height: 200px; max-height: 42dvh; }
        }
    </style>
</head>
<body>
<div class="aurora"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>
<div class="grid"></div>

<div class="console">
    <header>
        <div class="brand">
            <img class="logo" src="https://pbs.twimg.com/profile_images/1486372316196093953/cleZUCg0_400x400.png"
                 alt="Camunda" referrerpolicy="no-referrer"/>
            <div>
                <h1>Animal Picture <span>App</span></h1>
                <div class="tagline">Fetch · Store · Retrieve</div>
            </div>
        </div>
    </header>

    <div class="body">
        <div class="panel">
            <div>
                <div class="label">Species</div>
                <div class="species" id="species">
                    <button data-type="cat" class="active"><span class="emoji">🐱</span> Cat</button>
                    <button data-type="dog"><span class="emoji">🐶</span> Dog</button>
                    <button data-type="bear"><span class="emoji">🐻</span> Bear</button>
                </div>
            </div>

            <div>
                <div class="label">How many</div>
                <div class="controls">
                    <div class="stepper">
                        <button type="button" id="dec">−</button>
                        <input id="count" type="number" min="1" max="50" value="1"/>
                        <button type="button" id="inc">+</button>
                    </div>
                    <button class="btn-primary" id="fetchBtn">Fetch &amp; Store</button>
                    <button class="btn-ghost" id="lastBtn">Show Last Stored</button>
                </div>
            </div>

            <div id="status"></div>
        </div>

        <div class="preview">
            <div class="viewport empty" id="viewport">
                <img id="image" alt=""/>
            </div>
            <div class="meta" id="meta"></div>
        </div>
    </div>
</div>

<script>
    const speciesEl = document.getElementById('species');
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');
    const viewportEl = document.getElementById('viewport');
    const imageEl = document.getElementById('image');
    const metaEl = document.getElementById('meta');
    const fetchBtn = document.getElementById('fetchBtn');
    const lastBtn = document.getElementById('lastBtn');

    let currentType = 'cat';

    speciesEl.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        speciesEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentType = btn.dataset.type;
    });

    document.getElementById('inc').addEventListener('click', () => step(1));
    document.getElementById('dec').addEventListener('click', () => step(-1));
    function step(d) {
        let v = (parseInt(countEl.value, 10) || 1) + d;
        countEl.value = Math.max(1, Math.min(50, v));
    }

    function setStatus(msg, kind, loading) {
        statusEl.className = kind || '';
        statusEl.innerHTML = (loading ? '<span class="spinner"></span>' : '') + msg;
    }

    function renderImage(src, meta) {
        imageEl.onload = () => { viewportEl.classList.remove('empty'); viewportEl.classList.add('has-image'); };
        imageEl.onerror = () => { viewportEl.classList.add('empty'); viewportEl.classList.remove('has-image'); };
        imageEl.src = src;
        if (meta) {
            metaEl.innerHTML = `
                <span class="chip"><b>ID</b> ${meta.id}</span>
                <span class="chip"><b>TYPE</b> ${meta.type}</span>
                <span class="chip"><b>MIME</b> ${meta.contentType}</span>
                <span class="chip"><b>SIZE</b> ${(meta.sizeBytes / 1024).toFixed(1)} KB</span>
                <span class="chip" title="${meta.sourceUrl}"><b>SRC</b> ${meta.sourceUrl}</span>`;
        }
    }

    async function fetchAndStore() {
        const count = countEl.value;
        fetchBtn.disabled = true;
        setStatus(`Fetching ${count} ${currentType} picture(s)…`, '', true);
        try {
            const res = await fetch(`/api/v1/pictures?type=${currentType}&count=${count}`, { method: 'POST' });
            if (!res.ok) {
                const problem = await res.json().catch(() => ({}));
                throw new Error(problem.detail || `Request failed (${res.status})`);
            }
            const data = await res.json();
            const latest = data.pictures[data.pictures.length - 1];
            setStatus(`Stored ${data.count} ${currentType} picture(s).`, 'ok');
            renderImage(`${latest.url}?t=${Date.now()}`, latest);
        } catch (err) {
            setStatus(err.message, 'error');
        } finally {
            fetchBtn.disabled = false;
        }
    }

    async function showLastStored() {
        setStatus(`Loading last stored ${currentType} picture…`, '', true);
        try {
            const res = await fetch(`/api/v1/pictures/${currentType}/last/info`);
            if (!res.ok) {
                const problem = await res.json().catch(() => ({}));
                throw new Error(problem.detail || `No stored picture for "${currentType}".`);
            }
            const info = await res.json();
            setStatus(`Showing last stored ${currentType} picture.`, 'ok');
            renderImage(`/api/v1/pictures/${currentType}/last?t=${Date.now()}`, info);
        } catch (err) {
            setStatus(err.message, 'error');
        }
    }

    fetchBtn.addEventListener('click', fetchAndStore);
    lastBtn.addEventListener('click', showLastStored);
</script>
</body>
</html>
