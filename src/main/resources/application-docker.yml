# Activated with SPRING_PROFILES_ACTIVE=docker (see docker-compose.yml).
# Uses the PostgreSQL instance shipped alongside the app.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:animaldb}
    username: ${DB_USER:animal}
    password: ${DB_PASSWORD:animal}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
